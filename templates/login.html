<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso | PetMatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --primary: #4f46e5; /* Azul Eléctrico */
            --accent: #f43f5e;  /* Rosa Vibrante */
            --bg: #EEF2FF;      /* Azul muy pálido */
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 2px solid #e2e8f0;
        }

        .logo-icon {
            background: var(--primary);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 20px;
            transform: rotate(-10deg); /* Un toque juguetón */
        }

        h2 {
            color: #1e293b;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

        p.subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-wrapper {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 5px;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            background: #f8fafc;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-login:hover {
            background: #4338ca;
            transform: translateY(-2px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .back-link {
            margin-top: 25px;
            display: block;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo-icon">
            <i class='bx bxs-dog'></i>
        </div>
        <h2>PetMatch</h2>
        <p class="subtitle">Ingresa para gestionar las huellitas</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div style="color: var(--accent); font-size: 0.85rem; margin-bottom: 15px; font-weight: 600;">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-wrapper">
                <label>Usuario</label>
                <input type="text" name="username" placeholder="Tu usuario" required>
            </div>
            <div class="input-wrapper">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Entrar ahora</button>
        </form>

        <a href="/" class="back-link">
            <i class='bx bx-left-arrow-alt'></i> Volver al Catálogo
        </a>
    </div>

</body>
</html>
